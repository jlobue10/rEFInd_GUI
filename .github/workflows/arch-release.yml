name: Arch Package Release

# Builds the Arch package (.pkg.tar.zst) with makepkg inside an Arch container
# and attaches it to the GitHub Release for the tag — gives the CachyOS/Arch
# install path a prebuilt package instead of a local makepkg build.
#
# Runs automatically on version tags; workflow_dispatch takes an existing tag
# so a package can be (re)built for a release after the fact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to build and attach the package to'
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel-20260719.0.558177@sha256:bf0af8920a0e70715207d9c4f463ebac321db72748db2b8a391b639696965d87
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      # Exact makedepends plus the runtime depends (makepkg verifies both are
      # installed); makepkg then runs without -s, so a drifting PKGBUILD fails
      # loudly here.
      - name: Install build dependencies
        run: pacman -Syu --noconfirm git cmake gcc make qt6-base qt6-tools mokutil sbsigntools xterm zenity

      # Default checkout: the tag itself on tag pushes, the dispatched branch
      # on manual runs. The packaging recipe (PKGBUILD + service file) comes
      # from that ref, while the packaged source is the tag the PKGBUILD pins
      # via v$pkgver — so dispatching from main rebuilds an old release with
      # the current recipe, and the pkgver guard below keeps the pairing
      # honest.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Check PKGBUILD pkgver matches the tag
        run: |
          pkgver="$(sed -n 's/^pkgver=//p' PKGBUILD)"
          if [ "v${pkgver}" != "${TAG}" ]; then
            echo "::error::PKGBUILD pkgver=${pkgver} does not match tag ${TAG}; bump pkgver before tagging."
            exit 1
          fi

      - name: Build package (makepkg)
        run: |
          useradd -m builder
          chown -R builder: .
          su builder -c 'makepkg --noconfirm'

      - name: Upload package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch-package
          path: '*.pkg.tar.zst'

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Download package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: arch-package
          path: release

      - name: Attach package to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.TAG }}
          files: 'release/*.pkg.tar.zst'
